    function getQuery(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function setLang(lang){
      localStorage.setItem("siteLang", lang);
      applyLang(lang);
      render(lang);
    }

    function applyLang(lang){
      document.querySelectorAll("[data-lang]").forEach(function(el){
        el.style.display = (el.getAttribute("data-lang") === lang) ? "inline" : "none";
      });
      document.documentElement.setAttribute("lang", lang === "jp" ? "ja" : (lang === "en" ? "en" : "zh-CN"));
    }

    function render(lang){
      const key = getQuery("topic") || "fancy";
      const t = TOPICS[key] || TOPICS.fancy;

      const img = document.getElementById("topicImage");
      img.onerror = function(){
        img.onerror = null;
        img.src = "data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='1600' height='900'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%230b1220' offset='0'/%3E%3Cstop stop-color='%231a3c57' offset='1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23ffffff' font-size='38' font-family='Arial'%3EImage Not Found%3C/text%3E%3C/svg%3E";
      };
      img.src = t.image;
      img.alt = (t.title[lang] || t.title.zh || "OTSU YARN topic image");

      document.getElementById("topicTitle").textContent = t.title[lang] || t.title.zh;
      document.getElementById("topicDesc").textContent = t.desc[lang] || t.desc.zh;

      const tags = document.getElementById("topicTags");
      tags.innerHTML = "";
      t.tags.forEach(function(s){
        const li = document.createElement("li");
        li.textContent = s;
        tags.appendChild(li);
      });

      const body = document.getElementById("topicBody");
      body.innerHTML = (t.body && (t.body[lang] || t.body.zh)) ? (t.body[lang] || t.body.zh) : "";
    }

    document.addEventListener("DOMContentLoaded", function(){
      const lang = localStorage.getItem("siteLang") || "zh";
      applyLang(lang);
      render(lang);
    });
  </script>
